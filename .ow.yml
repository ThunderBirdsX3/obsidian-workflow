# ─────────────────────────────────────────────────────────────────────────────
# obsidian-workflow — project configuration (git-tracked)
# ─────────────────────────────────────────────────────────────────────────────
# Single config file. Resolved by scripts/ow-paths.sh:
#   .ow.yml  >  hardcoded defaults
# Generated by /ow-init — modify carefully
# ─────────────────────────────────────────────────────────────────────────────

# Project metadata
project:
  name: "My Project"                    # change to your project name
  slug: "my-project"                    # used in filenames
  language: "th"                        # primary language for docs/logs (th|en)
  timezone: "Asia/Bangkok"

# Obsidian vault location (relative to project root)
# แยกจาก docs/ ชั้นบนเพื่อให้ docs/ เก็บเอกสารอื่นได้ด้วย (README, public API docs)
vault_path: docs/vault

# Subagents enabled for this project + the AI model each one runs on.
# Files live in .claude/agents/<name>.md
#
# `model` — family ALIASES (opus | sonnet | haiku), no version pin, so each tracks the
# latest of its family (or pin a full id like claude-opus-4-8 if you must). The value is
# written into .claude/agents/<name>.md frontmatter by install.sh / scripts/ow-upgrade.sh /
# `bash scripts/ow-claude-manifest.sh --apply` — don't hand-edit the agent file.
#
# Shorthand: `<name>: true` (scalar) also works — enabled with the built-in default model
# (backend/frontend/mobile/security/design → opus; docs/verifier/test-runner → sonnet;
# gh-issue → haiku). The map form below just makes the model visible + editable.
subagents:
  docs:        { enabled: true,  model: sonnet }   # vault keeper, always on — executor เท่านั้น; งานคิด/ออกแบบอยู่ที่ command ชั้นบน (agents/docs.md §4.5)
  verifier:    { enabled: true,  model: sonnet }   # test/lint/build runner, always on
  security:    { enabled: true,  model: opus }   # secret/PII scanner, always on
  gh-issue:    { enabled: true,  model: haiku }   # GitHub issue + image reader, always on
  backend:     { enabled: false, model: sonnet }   # enable for API/server work
  frontend:    { enabled: false, model: sonnet }   # enable for web UI work
  mobile:      { enabled: false, model: sonnet }   # enable for mobile app work
  design:      { enabled: false, model: opus }   # design-system work (tokens/components)
  test-runner: { enabled: false, model: sonnet }   # Playwright / Maestro E2E runner

# Slash-command AI model — injected into each generated .claude/commands/ow-<verb>.md shim
# frontmatter by install.sh / scripts/ow-upgrade.sh / `bash scripts/ow-claude-manifest.sh --apply`.
# - `model` = default for EVERY command. `inherit` ⇒ no pin (command follows the session
#   model you're chatting in). Or set a family alias opus|sonnet|haiku (no version) /
#   full claude-* id to pin all commands.
# - `overrides.<verb>` pins one command (alias|claude-*|inherit). Invalid value ⇒ inherit.
commands:
  model: inherit                        # default: follow the current session model
  overrides:                            # pin heavy-reasoning / code-touching commands to opus
    ow-plan: opus
    ow-implement: opus
    ow-fix: opus
    ow-fix-issue: opus
    ow-reverse-engineer: opus
    ow-clarify: opus
    ow-checklist: opus
    ow-new: opus
    ow-design: opus
    ow-secure: opus

# Submodules (used by /ow-git and /ow-implement)
# Leave empty for monorepo / single-codebase projects
submodules: []
# Example multi-repo:
# submodules:
#   - name: api
#     path: ./api
#     branch: develop
#   - name: web
#     path: ./web
#     branch: develop

# Doc templates — single location (customize by editing files in .ow/templates/ directly)
template_lookup:
  - .ow/templates

# Safety guardrails
guardrails:
  no_fake_evidence: true                # never invent commit hash, test counts, links
  visible_menu_default: true            # UI checks via visible menu unless labeled technical-only
  prod_write_blocked: true              # block writes to production envs
  pii_masking_required: true            # screenshots with PII must be masked

# Evidence — where test/fix artifacts land (local-only; never in the vault)
evidence:
  root_template: "test-artifacts/{date}/{source}-{slug}"   # binaries ONLY here (gitignored)
  date_format: "%Y-%m-%d"
  # source → folder prefix. 1 folder per TASK (plan/fix), not per command: /ow-test
  # reuses the owning plan/fix folder and appends to its EVIDENCE.md.
  source_prefix: { plan: plan, fix: fix, test: test, test_plan: plan }
  vault_binaries_forbidden: true        # HARD: no binaries in the vault, ever
  screenshot: { no_login_first_frame: true, min_per_tc: 2, numbered: true }

# Build/test per area. OPTIONAL — empty ⇒ resolver falls back to repo convention
# (scripts in package.json / Makefile / etc.). Never makes a toolchain mandatory.
verification_matrix: []
#   - { area: default, detect: "package.json", build: "<build cmd>", test: "<test cmd>", pass_regex: "<regex>" }

# Test-credential SCHEMA only — actual values live in the gitignored env file.
test_credentials:
  env_file: ".env.test"
  example_file: ".env.test.example"
  roles: []                             # [{ label: role1, user_var: TEST_ROLE1_USER, pass_var: TEST_ROLE1_PASS }]
  redact: true                          # mask any value read from the env file in logs/evidence

# /ow-git --bump version stamping
version_bump: { files: [], docs_only_skip: true, append_tag: "[v{version}]", unified: true }

# Vault dir-name overrides — only entries that DIFFER from the numbered default.
vault_dirs: {}
#   phases: "50-Phases"

# Integrity gate — required artifacts before a status flip.
integrity_gate:
  require_artifact_for_status: [done, fixed]
  required_files:
    plan:      [BUILD-INFO.md]
    fix_ui:    [EVIDENCE.md, "before-*.png", "after-*.png"]
    test_plan: [MANIFEST.md]
  verify_commit_hashes: true

# Project rules registry. Empty files ⇒ glob .ow/rules/*.md by applies_to.
rules: { dir: ".ow/rules", files: [] }
